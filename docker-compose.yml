services:
  api:
    build: .
    platform: linux/amd64
    container_name: sentiment_dl_api
    ports:
      - "8080:8000"
    volumes:
      - ./saved_models:/workspace/saved_models
      - ./app:/workspace/app
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      - mlflow

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.10.2
    container_name: sentiment_mlflow
    ports:
      - "5001:5000"
    volumes:
      - ./mlruns:/mlruns
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlruns/mlflow.db
      --default-artifact-root /mlruns/artifacts

  prometheus:
    image: prom/prometheus:latest
    container_name: sentiment_prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules.yml:/etc/prometheus/rules.yml:ro

  alertmanager:
    image: prom/alertmanager:latest
    container_name: sentiment_alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'

  grafana:
    image: grafana/grafana:latest
    container_name: sentiment_grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin

  frontend:
    build: ./frontend
    container_name: sentiment_react_ui
    ports:
      - "4000:3000"
    depends_on:
      - api
