services:
  api:
    image: ghcr.io/trghoangminh/sentiment-api:latest
    platform: linux/amd64
    container_name: sentiment_dl_api
    ports:
      - "8080:8000"
    volumes:
      - ./saved_models:/workspace/saved_models
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      - mlflow

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.10.2
    container_name: sentiment_mlflow
    ports:
      - "5001:5000"
    volumes:
      - ./mlruns:/mlruns
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlruns/mlflow.db
      --default-artifact-root /mlruns/artifacts

  prometheus:
    image: prom/prometheus:latest
    container_name: sentiment_prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:latest
    container_name: sentiment_grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
