name: CI/CD demo

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  run-tests:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Pytest
      run: |
        PYTHONPATH=. pytest tests/

  build-image:
    name: Build Docker Image
    needs: run-tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Core API Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/sentiment-api:latest
            ghcr.io/${{ github.repository_owner }}/sentiment-api:${{ github.sha }}

  deploy:
    name: Deploy to localhost
    needs: build-image
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Pull Latest API Image 
        run: |
          export PATH=$PATH:/Applications/Docker.app/Contents/Resources/bin:/usr/local/bin
          docker pull ghcr.io/${{ github.repository_owner }}/sentiment-api:latest
          
      - name: Restart Localhost Containers
        run: |
          export PATH=$PATH:/Applications/Docker.app/Contents/Resources/bin:/usr/local/bin
          # Dùng docker compose để update các service
          docker compose up -d
