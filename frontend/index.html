<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentiment Studio</title>
    <!-- Modern Typeface for Premium Feel -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Sophisticated Color Palette */
            --bg-base: #060913;
            --surface: rgba(20, 24, 39, 0.6);
            --surface-hover: rgba(30, 35, 50, 0.7);
            --border-light: rgba(255, 255, 255, 0.08);
            --border-focus: rgba(138, 101, 246, 0.5);
            
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            
            --accent: #6b21a8;
            --accent-glow: #a855f7;
            
            --pos-color: #22c55e;
            --pos-glow: rgba(34, 197, 94, 0.2);
            
            --neg-color: #ef4444;
            --neg-glow: rgba(239, 68, 68, 0.2);
            
            --neu-color: #3b82f6;
            --neu-glow: rgba(59, 130, 246, 0.2);
        }

        body {
            margin: 0;
            min-height: 100vh;
            background-color: var(--bg-base);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Abstract Mesh Gradient Background */
        .mesh-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(76, 29, 149, 0.15), transparent 40%),
                radial-gradient(circle at 85% 30%, rgba(30, 58, 138, 0.15), transparent 40%),
                radial-gradient(circle at 50% 80%, rgba(15, 23, 42, 0.3), transparent 50%);
            filter: blur(60px);
            animation: pulse-bg 15s ease-in-out infinite alternate;
        }

        @keyframes pulse-bg {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.1) translate(-20px, 20px); }
        }

        /* App Navbar */
        .navbar {
            padding: 24px 48px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            background: linear-gradient(180deg, rgba(6, 9, 19, 0.8) 0%, transparent 100%);
            backdrop-filter: blur(12px);
            z-index: 10;
        }

        .logo {
            font-weight: 700;
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: -0.5px;
        }

        .logo-dot {
            width: 10px; height: 10px;
            background: var(--accent-glow);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        /* Main Container */
        .main-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .app-card {
            width: 100%;
            max-width: 640px;
            background: var(--surface);
            border: 1px solid var(--border-light);
            border-radius: 32px;
            padding: 48px;
            box-shadow: 0 30px 60px -20px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transform: translateY(20px);
            opacity: 0;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            position: relative;
        }

        @keyframes slideUp {
            to { transform: translateY(0); opacity: 1; }
        }

        .hero-text {
            text-align: center;
            margin-bottom: 40px;
        }

        .hero-text h1 {
            font-size: 36px;
            font-weight: 700;
            margin: 0 0 12px 0;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #fff 0%, #a8a2bc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-text p {
            font-size: 16px;
            color: var(--text-secondary);
            margin: 0;
            line-height: 1.5;
        }

        /* Input Area Customization */
        .input-group {
            position: relative;
            margin-bottom: 32px;
        }

        .custom-textarea {
            width: 100%;
            min-height: 140px;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid var(--border-light);
            border-radius: 20px;
            padding: 20px;
            color: white;
            font-family: inherit;
            font-size: 16px;
            line-height: 1.6;
            resize: none;
            box-sizing: border-box;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }

        .custom-textarea::placeholder {
            color: #475569;
        }

        .custom-textarea:focus {
            outline: none;
            border-color: var(--border-focus);
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 0 4px rgba(138, 101, 246, 0.1), inset 0 2px 4px rgba(0,0,0,0.2);
        }

        /* Premium Button */
        .btn-analyze {
            width: 100%;
            background: linear-gradient(135deg, var(--accent) 0%, #4c1d95 100%);
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 18px;
            font-size: 16px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px -10px var(--accent);
        }

        .btn-analyze::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: 0.5s;
        }

        .btn-analyze:hover::before {
            left: 100%;
        }

        .btn-analyze:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -10px var(--accent-glow);
        }

        .btn-analyze:disabled {
            background: #1e293b;
            color: #64748b;
            border-color: transparent;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        /* Glowing Result Card */
        .result-box {
            margin-top: 32px;
            padding: 2px;
            border-radius: 24px;
            background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
            display: none;
            opacity: 0;
            transition: opacity 0.5s ease, transform 0.5s ease;
            position: relative;
        }

        .result-box.active {
            display: block;
            opacity: 1;
            transform: scale(1.01);
            animation: emerge 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes emerge {
            0% { opacity: 0; transform: translateY(10px) scale(0.98); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .result-inner {
            background: #0f1222;
            border-radius: 22px;
            padding: 32px;
            text-align: center;
            position: relative;
            z-index: 2;
            overflow: hidden;
        }

        .result-glow {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 150px; height: 150px;
            border-radius: 50%;
            filter: blur(50px);
            z-index: -1;
            opacity: 0.5;
            transition: background 0.5s ease;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 8px 20px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 16px;
            border: 1px solid transparent;
        }
        
        .metric-label {
            color: var(--text-secondary);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0 0 4px 0;
        }

        .metric-value {
            font-size: 24px;
            font-weight: 600;
            margin: 0;
        }

        /* Status Colors */
        .status-positive .badge {
            color: var(--pos-color);
            background: rgba(34, 197, 94, 0.1);
            border-color: rgba(34, 197, 94, 0.2);
        }
        .status-positive .result-glow { background: var(--pos-color); }
        
        .status-negative .badge {
            color: var(--neg-color);
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.2);
        }
        .status-negative .result-glow { background: var(--neg-color); }
        
        .status-neutral .badge {
            color: var(--neu-color);
            background: rgba(59, 130, 246, 0.1);
            border-color: rgba(59, 130, 246, 0.2);
        }
        .status-neutral .result-glow { background: var(--neu-color); }


        /* Processing Loader */
        .loader-dots {
            display: none;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }

        .loader-dots div {
            width: 6px; height: 6px;
            background: #fff;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .loader-dots div:nth-child(1) { animation-delay: -0.32s; }
        .loader-dots div:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 24px;
            color: rgba(255,255,255,0.3);
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="mesh-bg"></div>

    <nav class="navbar">
        <div class="logo">
            <div class="logo-dot"></div>
            Sentiment Studio
        </div>
    </nav>

    <div class="main-wrapper">
        <div class="app-card">
            
            <div class="hero-text">
                <h1>Analyze Context & Tone</h1>
                <p>Harness our machine learning model to uncover the underlying sentiment of any textual data.</p>
            </div>

            <div class="input-group">
                <textarea id="textInput" class="custom-textarea" placeholder="Paste or type your review, tweet, or feedback here..."></textarea>
            </div>

            <button id="analyzeBtn" class="btn-analyze" onclick="processText()">
                <span id="btnText">Run Analysis</span>
                <div id="btnLoader" class="loader-dots">
                    <div></div><div></div><div></div>
                </div>
            </button>

            <div id="resultBox" class="result-box">
                <div class="result-inner">
                    <div id="resultGlow" class="result-glow"></div>
                    <div id="sentimentBadge" class="badge">POSITIVE</div>
                    
                    <div style="display: flex; justify-content: space-around; margin-top: 10px;">
                        <div>
                            <p class="metric-label">Confidence Score</p>
                            <p id="confidenceText" class="metric-value">98.5%</p>
                        </div>
                        <div>
                            <p class="metric-label">Latency</p>
                            <p id="latencyText" class="metric-value">45ms</p>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div class="footer">
        Powered by FastAPI & HuggingFace Transformers
    </div>

    <script>
        async function processText() {
            const input = document.getElementById('textInput');
            const resultBox = document.getElementById('resultBox');
            const badge = document.getElementById('sentimentBadge');
            const confText = document.getElementById('confidenceText');
            const latencyText = document.getElementById('latencyText');
            
            const btn = document.getElementById('analyzeBtn');
            const btnText = document.getElementById('btnText');
            const btnLoader = document.getElementById('btnLoader');

            const text = input.value.trim();
            if (text.length < 2) {
                // Shake effect on error could be added
                input.focus();
                return;
            }

            // UI State: Loading
            btn.disabled = true;
            btnText.style.display = 'none';
            btnLoader.style.display = 'flex';
            
            // Hide result smoothly if open
            resultBox.classList.remove('active');
            resultBox.className = 'result-box'; // Reset statuses

            try {
                // Give a tiny artificial delay to make the UI feel thoughtful
                await new Promise(r => setTimeout(r, 400));

                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text })
                });

                if (!response.ok) throw new Error("API request failed");
                const data = await response.json();

                // Plot data
                badge.textContent = data.sentiment.toUpperCase();
                confText.textContent = data.confidence.toFixed(1) + "%";
                latencyText.textContent = data.latency_ms + "ms";

                if (data.sentiment === "Positive") {
                    resultBox.classList.add('status-positive');
                } else if (data.sentiment === "Negative") {
                    resultBox.classList.add('status-negative');
                } else {
                    resultBox.classList.add('status-neutral');
                }

                // Show Result
                resultBox.classList.add('active');

            } catch (err) {
                console.error(err);
                alert("Failed to analyze. Check server connection.");
            } finally {
                // UI State: Ready
                btn.disabled = false;
                btnText.style.display = 'block';
                btnLoader.style.display = 'none';
            }
        }

        // Allow 'Cmd+Enter' or 'Ctrl+Enter' to submit
        document.getElementById('textInput').addEventListener('keydown', function(e) {
            if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
                processText();
            }
        });
    </script>
</body>
</html>
